<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 360px;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(135deg, #0f3460, #16213e);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 14px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-label {
            font-size: 11px;
            color: #888;
        }

        .toggle {
            width: 40px;
            height: 22px;
            background: #333;
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle.active {
            background: #4CAF50;
        }

        .toggle::after {
            content: '';
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle.active::after {
            transform: translateX(18px);
        }

        .current-site {
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .site-domain {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }

        .site-status {
            font-size: 11px;
            margin-bottom: 8px;
        }

        .status-de {
            color: #ffcc00;
        }

        .status-us {
            color: #4CAF50;
        }

        .status-direct {
            color: #ff9800;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        .btn {
            flex: 1;
            padding: 7px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-de {
            background: linear-gradient(135deg, #333, #555);
            color: #ffcc00;
        }

        .btn-us {
            background: linear-gradient(135deg, #0f3460, #533483);
            color: #fff;
        }

        .btn-remove {
            background: #ff4444;
            color: white;
        }

        .section {
            padding: 6px 16px;
            font-size: 10px;
            text-transform: uppercase;
            color: #555;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .add-row {
            padding: 4px 16px 8px;
            display: flex;
            gap: 4px;
        }

        .add-row input {
            flex: 1;
            padding: 6px 8px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f0f23;
            color: #e0e0e0;
            font-size: 11px;
            outline: none;
        }

        .add-row input:focus {
            border-color: #533483;
        }

        .add-row button {
            padding: 6px 8px;
            border: none;
            border-radius: 6px;
            font-size: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .add-de {
            background: #555;
            color: #ffcc00;
        }

        .add-us {
            background: #533483;
            color: white;
        }

        .domain-list {
            max-height: 150px;
            overflow-y: auto;
            padding: 0 16px 4px;
        }

        .domain-list::-webkit-scrollbar {
            width: 4px;
        }

        .domain-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        .domain-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #111;
        }

        .domain-item .name {
            font-size: 11px;
            color: #ccc;
        }

        .domain-item .name.default {
            color: #777;
        }

        .domain-item .tag {
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .tag-de {
            background: #333;
            color: #ffcc00;
        }

        .tag-us {
            background: #1a1a4e;
            color: #7b7bff;
        }

        .tag-auto {
            background: #1a1a2e;
            color: #555;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 13px;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .remove-btn:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        .footer {
            padding: 6px 16px;
            text-align: center;
            font-size: 9px;
            color: #444;
            border-top: 1px solid #0f3460;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🦊 OwnStep Proxy</h1>
        <div class="toggle-wrap">
            <span class="toggle-label">VPN</span>
            <div class="toggle active" id="mainToggle"></div>
        </div>
    </div>

    <div class="current-site">
        <div class="site-domain" id="siteDomain">—</div>
        <div class="site-status" id="siteStatus">Загрузка...</div>
        <div class="btn-group">
            <button class="btn btn-de" id="btnDE">🇩🇪 Германия</button>
            <button class="btn btn-us" id="btnUS">🇺🇸 США</button>
            <button class="btn btn-remove" id="btnRemove" style="display:none">✕ Убрать</button>
        </div>
    </div>

    <div class="section">Добавить домен</div>
    <div class="add-row">
        <input type="text" id="customInput" placeholder="twitch.tv">
        <button class="add-de" id="addDE">+🇩🇪</button>
        <button class="add-us" id="addUS">+🇺🇸</button>
    </div>

    <div class="section">Мои домены</div>
    <div class="domain-list" id="customList"></div>

    <div class="section">Авто: 🇺🇸 США</div>
    <div class="domain-list" id="defaultUSList"></div>

    <div class="section">Авто: 🇩🇪 Германия</div>
    <div class="domain-list" id="defaultDEList"></div>

    <div class="footer">DE: SOCKS5 127.0.0.1:10808 — US: SOCKS5 127.0.0.1:10818</div>

    <script src="popup.js"></script>
</body>

</html>
