<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 340px;
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .header {
            background: linear-gradient(135deg, #0f3460, #16213e);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-size: 15px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-label {
            font-size: 11px;
            color: #888;
        }

        .toggle {
            width: 40px;
            height: 22px;
            background: #333;
            border-radius: 11px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: #4CAF50;
        }

        .toggle::after {
            content: '';
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle.active::after {
            transform: translateX(18px);
        }

        .current-site {
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .current-site .domain {
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 8px;
        }

        .current-site .status {
            font-size: 11px;
            margin-bottom: 8px;
        }

        .status.proxied {
            color: #4CAF50;
        }

        .status.direct {
            color: #ff9800;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add {
            background: linear-gradient(135deg, #0f3460, #533483);
            color: white;
        }

        .btn-add:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-remove {
            background: #ff4444;
            color: white;
        }

        .btn-remove:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            padding: 10px 16px 6px;
            letter-spacing: 0.5px;
        }

        .add-custom {
            padding: 8px 16px;
            display: flex;
            gap: 6px;
        }

        .add-custom input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f0f23;
            color: #e0e0e0;
            font-size: 12px;
            outline: none;
        }

        .add-custom input:focus {
            border-color: #533483;
        }

        .add-custom button {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: #533483;
            color: white;
            font-size: 12px;
            cursor: pointer;
        }

        .add-custom button:hover {
            background: #6a42a0;
        }

        .domain-list {
            max-height: 200px;
            overflow-y: auto;
            padding: 0 16px 8px;
        }

        .domain-list::-webkit-scrollbar {
            width: 4px;
        }

        .domain-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .domain-list::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        .domain-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .domain-item .name {
            font-size: 12px;
            color: #ccc;
        }

        .domain-item .name.default {
            color: #888;
        }

        .domain-item .remove-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .domain-item .remove-btn:hover {
            background: rgba(255, 68, 68, 0.1);
        }

        .domain-item .tag {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 3px;
            background: #1a1a2e;
            color: #666;
        }

        .footer {
            padding: 8px 16px;
            text-align: center;
            font-size: 10px;
            color: #444;
            border-top: 1px solid #0f3460;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>⚡ ShadowLink Proxy</h1>
        <div class="toggle-wrap">
            <span class="toggle-label">VPN</span>
            <div class="toggle active" id="mainToggle"></div>
        </div>
    </div>

    <div class="current-site">
        <div class="domain" id="currentDomain">—</div>
        <div class="status" id="currentStatus">Загрузка...</div>
        <button class="btn" id="toggleSiteBtn" disabled>—</button>
    </div>

    <div class="section-title">Добавить домен вручную</div>
    <div class="add-custom">
        <input type="text" id="customInput" placeholder="например: twitch.tv">
        <button id="addCustomBtn">+</button>
    </div>

    <div class="section-title">Мои домены</div>
    <div class="domain-list" id="customList"></div>

    <div class="section-title">Автоматический список</div>
    <div class="domain-list" id="defaultList"></div>

    <div class="footer">ShadowLink • SOCKS5 127.0.0.1:10808</div>

    <script src="popup.js"></script>
</body>

</html>
